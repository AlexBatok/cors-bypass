<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="24" ry="24" fill="url(#bg)"/>
  <!-- Two-arrow CORS symbol -->
  <g transform="translate(64,64)" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left arrow pointing right -->
    <line x1="-32" y1="-14" x2="24" y2="-14"/>
    <polyline points="14,-26 26,-14 14,-2"/>
    <!-- Right arrow pointing left -->
    <line x1="32" y1="14" x2="-24" y2="14"/>
    <polyline points="-14,2 -26,14 -14,26"/>
  </g>
</svg>
